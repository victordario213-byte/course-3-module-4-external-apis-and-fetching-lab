<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Alerts Lab</title>
  <style>
    #error-message {
      color: red;
      display: none;
      margin-top: 10px;
    }
    #alerts-container {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Weather Alerts</h1>

  <input type="text" id="state-input" placeholder="Enter state abbreviation (e.g. MN)" maxlength="2">
  <button id="fetch-btn">Get Weather Alerts</button>

  <div id="error-message"></div>
  <div id="alerts-container"></div>

  <script src="script.js"></script>
</body>
</html>
